<div class="background">
  <div class="modal" role="dialog" aria-modal="true" cdkTrapFocus [cdkTrapFocusAutoCapture]="true">
    <header class="modal__header">
      <h2 class="modal__title">{{ label() }}</h2>
    </header>

    <footer class="modal__footer">
      <button btn="secondary" (click)="onCancel()">Cancel</button>
      <button btn="danger" (click)="onConfirm()">Confirm</button>
    </footer>
  </div>
</div>
